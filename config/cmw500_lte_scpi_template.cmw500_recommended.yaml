instrument:
  name: CMW500
  transport: socket
  default_port: 5025

lte:
  setup:
    - type: write
      command: "INST LTE"
    - type: write
      command: "CONFigure:LTE:SIGN:PCC:BAND OB{band_number}"
    - type: write
      command: "CONFigure:LTE:SIGN:CELL:BANDwidth:PCC:DL {bw}"
    - type: write
      command: "CONFigure:LTE:SIGN:RFSettings:CHANnel:DL {channel}"
    # Query steps always consume their response and are saved in command_trace.
    - type: query
      command: "CONFigure:LTE:SIGN:RFSettings:FREQuency:DL?"
    - type: write
      command: "CONFigure:LTE:SIGN:EBLer:REPetition SING"
    - type: write
      command: "CONFigure:LTE:SIGN:EBLer:SFRames {packet_count}"

  cell_on:
    - type: write
      command: "SOURce:LTE:SIGN:CELL:STATe ON"

  wait_attach:
    query: "SENSe:LTE:SIGN:RRCState?"
    parser: "regex"
    expected: "^CONN$"
    interval_sec: 0.2
    timeout_sec: 30.0
    fallback_success: false

  set_rx_level:
    - type: write
      command: "CONFigure:LTE:SIGN:DL:RSEPre:LEVel {rx_level}"

  measure_bler:
    start:
      - type: write
        command: "INITiate:LTE:SIGN:EBLer"
    state_query: "FETCh:LTE:SIGN:EBLer:STATe?"
    state_parser: "regex"
    state_done: "^RDY$"
    state_interval_sec: 0.05
    state_timeout_sec: 8.0
    stop:
      - type: write
        command: "STOP:LTE:SIGN:EBLer"
    query: "FETCh:LTE:SIGN:EBLer:RELative?"
    parser: "csv_index:3"
    fallback_simulation: false

  cell_off:
    - type: write
      command: "SOURce:LTE:SIGN:CELL:STATe OFF"

  cleanup:
    - type: query_and_assert
      command: "SYST:ERR?"
      parser: "regex"
      expected: '^\s*0(?:,|$)'
