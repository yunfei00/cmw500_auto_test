name: Windows Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Build Windows package directory
        run: python scripts/build_windows.py

      - name: Package release archive
        run: python scripts/package_release.py --version "${{ github.ref_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CMW500AutoTest-windows-x64
          path: release/*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: CMW500 Auto Test ${{ github.ref_name }}
          body: |
            - Windows x64 portable package
            - unzip and run CMW500AutoTest.exe
          files: release/*.zip
